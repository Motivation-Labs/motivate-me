name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine version bump from commits
        id: bump
        run: |
          # Get commits since last tag (or all commits if no tag)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" --no-merges)
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from conventional commits
          BUMP="none"
          if echo "$COMMITS" | grep -qiE "^(feat|fix|refactor|perf|test|chore|docs|style|ci|build)(\(.+\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE "^(fix|perf|refactor)(\(.+\))?:"; then
            BUMP="patch"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

      - name: Bump version
        if: steps.bump.outputs.skip != 'true'
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP="${{ steps.bump.outputs.bump }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

          # Update package.json version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Generate release notes
        if: steps.bump.outputs.skip != 'true'
        id: notes
        run: |
          LAST_TAG="${{ steps.bump.outputs.last_tag }}"
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%H %s" --no-merges)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%H %s" --no-merges)
          fi

          BREAKING=""
          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            HASH="${line:0:7}"
            MSG="${line:41}"

            if echo "$MSG" | grep -qiE "^.+!:|BREAKING CHANGE"; then
              BREAKING="${BREAKING}- ${MSG} (\`${HASH}\`)\n"
            elif echo "$MSG" | grep -qiE "^feat(\(.+\))?:"; then
              FEATURES="${FEATURES}- ${MSG} (\`${HASH}\`)\n"
            elif echo "$MSG" | grep -qiE "^fix(\(.+\))?:"; then
              FIXES="${FIXES}- ${MSG} (\`${HASH}\`)\n"
            else
              OTHER="${OTHER}- ${MSG} (\`${HASH}\`)\n"
            fi
          done <<< "$COMMITS"

          NOTES="# ${TAG}\n\n"

          if [ -n "$BREAKING" ]; then
            NOTES="${NOTES}## Breaking Changes\n\n${BREAKING}\n"
          fi
          if [ -n "$FEATURES" ]; then
            NOTES="${NOTES}## Features\n\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            NOTES="${NOTES}## Bug Fixes\n\n${FIXES}\n"
          fi
          if [ -n "$OTHER" ]; then
            NOTES="${NOTES}## Other Changes\n\n${OTHER}\n"
          fi

          # Write to file for the release body
          echo -e "$NOTES" > RELEASE_NOTES.md

      - name: Commit version bump
        if: steps.bump.outputs.skip != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${TAG}"
          git tag "$TAG"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md
